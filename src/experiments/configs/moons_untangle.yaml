
name: "moons_untangle"
data:
  name: "moons"
  n_samples: 1000
  noise: 0.05
  standardize: true

model:
  encoder: "mlp"
  embed_dim: 2
  num_prototypes: 2
  cost_type: "squared_euclidean"

ot:
  epsilon: 0.05
  sinkhorn_iter: 50
  use_divergence: true

reg:
  lambda_mass: 0.1
  lambda_disp: 0.01
  lambda_lap: 0.0
  disp_type: "l2"

training:
  batch_size: 128
  epochs: 50
  warmup_epochs: 10
  lr_enc: 0.001
  lr_proto: 0.01
  lr_mass: 0.01
  eval_every: 5
