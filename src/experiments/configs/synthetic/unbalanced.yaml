name: "synthetic_unbalanced"
wandb: false
data:
  name: "unbalanced"
  n_samples: 2000
  standardize: true
model:
  encoder: "identity"
  num_prototypes: 3
  embed_dim: 2
  cost_type: "squared_euclidean"
ot:
  epsilon: 0.05
  sinkhorn_iter: 50
reg:
  lambda_mass: 0.5  # High mass entropy to handle unbalanced clusters
  lambda_disp: 0.1
training:
  batch_size: 128
  epochs: 100
  lr_enc: 1e-3
  lr_proto: 1e-2
  lr_mass: 1e-1  # Faster mass adaptation
  eval_every: 10
