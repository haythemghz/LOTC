# MNIST experiment with MLP encoder
name: mnist_mlp
seed: 42
n_seeds: 10
device: auto
output_dir: experiments/results

data:
  name: mnist
  n_clusters: 10
  image_size: 28
  in_channels: 1
  use_pretrained_features: false

encoder:
  type: mlp
  hidden_dims: [512, 256]
  output_dim: 64
  dropout: 0.1
  batch_norm: true

ot:
  epsilon: 0.1
  sinkhorn_iter: 50
  sinkhorn_tol: 0.0
  cost_fn: sqeuclidean

reg:
  lambda_mass: 0.01
  lambda_disp: 0.001
  lambda_lap: 0.0

training:
  epochs: 100
  batch_size: 256
  lr_encoder: 0.001
  lr_prototypes: 0.001
  lr_masses: 0.001
  learn_masses: true
  init_method: kmeans
  mode: minibatch
  log_every: 10
  save_every: 50
