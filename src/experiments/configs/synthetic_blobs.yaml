# Synthetic blobs experiment — full run
name: synthetic_blobs
seed: 42
n_seeds: 10
device: auto
output_dir: experiments/results

data:
  name: blobs
  n_samples: 1000
  n_features: 2
  n_clusters: 5
  noise: 0.0

encoder:
  type: identity

ot:
  epsilon: 0.05
  sinkhorn_iter: 50
  sinkhorn_tol: 0.0
  cost_fn: sqeuclidean

reg:
  lambda_mass: 0.01
  lambda_disp: 0.001
  lambda_lap: 0.0

training:
  epochs: 200
  batch_size: 256
  lr_prototypes: 0.005
  lr_masses: 0.005
  learn_masses: true
  init_method: kmeans
  mode: full
  log_every: 20
  save_every: 100
